<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="钻井工具箱 — 钻井、固井、完井增产、采油等专业工具与标准参数库，共 34 项">
  <meta name="theme-color" content="#0d9488">
  <title>钻井工具箱 · Drilling Toolkit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230d9488'/><path d='M50 20v60M30 40h40M35 55h30' stroke='white' stroke-width='6' stroke-linecap='round' fill='none'/></svg>">
  <style>
:root {
  --bg: #f4f6f8;
  --surface: #ffffff;
  --surface-2: #f8fafb;
  --border: rgba(15, 23, 42, 0.08);
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-tertiary: #94a3b8;
  --accent: #0d9488;
  --accent-hover: #0f766e;
  --accent-soft: rgba(13, 148, 136, 0.1);
  --accent-gradient: linear-gradient(135deg, #0d9488, #14b8a6);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.04);
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
    "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
  --mono: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
  --max: 1200px;
  --header-h: 52px;
  --sidebar-w: 260px;
}

[data-theme="dark"] {
  --bg: #0b0f14;
  --surface: #151b24;
  --surface-2: #1a2230;
  --border: rgba(255, 255, 255, 0.08);
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-tertiary: #64748b;
  --accent-soft: rgba(20, 184, 166, 0.15);
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }

/* Header */
header {
  position: sticky; top: 0; z-index: 100;
  height: var(--header-h);
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border);
}

[data-theme="dark"] header {
  background: rgba(11, 15, 20, 0.85);
}

.header-inner {
  max-width: var(--max); margin: 0 auto; padding: 0 20px;
  height: 100%; display: flex; align-items: center; gap: 12px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--text); flex-shrink: 0;
}

.logo-mark {
  width: 30px; height: 30px;
  background: var(--accent-gradient);
  border-radius: 8px; display: grid; place-items: center;
}

.logo-mark svg { width: 16px; height: 16px; stroke: #fff; fill: none; }
.logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }

.header-back {
  width: 32px; height: 32px; border: none; background: var(--surface-2);
  border-radius: 8px; cursor: pointer; display: grid; place-items: center;
  color: var(--text-secondary); transition: background 0.15s;
}

.header-back.hidden { display: none; }
.header-back:hover { background: var(--accent-soft); color: var(--accent); }
.header-back svg { width: 18px; height: 18px; }

#page-title {
  flex: 1; font-size: 15px; font-weight: 600;
  letter-spacing: -0.02em; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

#page-title:empty { display: none; }

.header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }

.icon-btn {
  width: 36px; height: 36px; border: none; background: none;
  border-radius: 8px; cursor: pointer; color: var(--text-secondary);
  display: grid; place-items: center; transition: background 0.15s, color 0.15s;
}

.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn svg { width: 20px; height: 20px; }

.sidebar-toggle { display: none; }

/* App shell + sidebar */
.app-shell {
  display: flex;
  min-height: calc(100vh - var(--header-h));
}

.app-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 12px 0 24px;
  scrollbar-width: thin;
}

.sidebar-inner { padding: 0 10px; }

.sidebar-nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: background 0.12s, color 0.12s;
}

.sidebar-nav-link:hover {
  background: var(--surface-2);
  color: var(--text);
}

.sidebar-nav-link.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}

.sidebar-nav-link svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.75;
}

.sidebar-nav-link.active svg { opacity: 1; }

.sidebar-bonus-link {
  width: 100%;
  border: none;
  font: inherit;
  cursor: pointer;
  color: #ea580c;
  background: rgba(234, 88, 12, 0.06);
  margin-bottom: 4px;
}

.sidebar-bonus-link:hover {
  background: rgba(234, 88, 12, 0.12);
  color: #c2410c;
}

.sidebar-external-link {
  margin-top: 6px;
  color: var(--accent);
  border: 1px dashed color-mix(in srgb, var(--accent) 35%, var(--border));
  background: var(--accent-soft);
}

.sidebar-external-link:hover {
  background: color-mix(in srgb, var(--accent-soft) 70%, var(--accent) 30%);
  color: var(--accent);
}

.sidebar-tool-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.sidebar-section { margin-bottom: 6px; }

.sidebar-section-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border: none;
  background: none;
  cursor: pointer;
  padding: 12px 12px 10px;
  border-radius: 10px;
  color: inherit;
  transition: background 0.12s;
}

.sidebar-section-toggle:hover {
  background: var(--surface-2);
}

.sidebar-section-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  text-align: left;
}

.sidebar-chevron {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: var(--text-tertiary);
  transition: transform 0.2s ease;
}

.sidebar-section.collapsed .sidebar-chevron {
  transform: rotate(-90deg);
}

.sidebar-section-body {
  overflow: hidden;
}

.sidebar-section.collapsed .sidebar-section-body {
  display: none;
}

.sidebar-section-desc {
  font-size: 12px;
  color: var(--text-tertiary);
  padding: 0 12px 8px;
  line-height: 1.45;
}

.sidebar-tools { display: flex; flex-direction: column; gap: 2px; padding-left: 4px; }

.sidebar-empty {
  font-size: 13px;
  color: var(--text-tertiary);
  padding: 8px 12px 12px;
  line-height: 1.5;
}

.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  top: var(--header-h);
  background: rgba(15, 23, 42, 0.35);
  z-index: 90;
}

[data-theme="dark"] .sidebar-backdrop {
  background: rgba(0, 0, 0, 0.55);
}

@media (max-width: 900px) {
  .sidebar-toggle { display: grid; }

  .sidebar {
    position: fixed;
    left: 0;
    top: var(--header-h);
    z-index: 100;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: var(--shadow);
  }

  body.sidebar-open .sidebar { transform: translateX(0); }

  body.sidebar-open .sidebar-backdrop {
    display: block;
  }

  .header-inner { padding: 0 12px; }
  .logo-text { display: none; }
}

@media (min-width: 901px) {
  .header-inner { max-width: none; padding: 0 16px 0 12px; }
  .page-content { max-width: none; padding: 24px 28px 64px; }
  .hero-inner { max-width: none; padding: 36px 28px 28px; }
}

/* Hero */
.hero {
  background: linear-gradient(180deg, rgba(13, 148, 136, 0.08) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}

.hero-inner {
  max-width: var(--max); margin: 0 auto;
  padding: 36px 20px 28px;
}

.hero-layout {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 28px;
}

.hero-main {
  flex: 1;
  min-width: 0;
}

.hero-promo {
  flex-shrink: 0;
}

.hero-promo-card,
.footer-promo {
  cursor: pointer;
}

.hero-promo-card {
  width: 200px;
  padding: 16px 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  text-align: center;
}

.hero-promo-label {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 3px 10px;
  border-radius: 100px;
  margin-bottom: 12px;
}

.hero-promo-img {
  display: block;
  width: 128px;
  height: 128px;
  margin: 0 auto 10px;
  border-radius: 12px;
  object-fit: cover;
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
}

.hero-promo-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 4px;
}

.hero-promo-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.45;
}

.hero-badge {
  display: inline-block; font-size: 12px; font-weight: 600;
  color: var(--accent); background: var(--accent-soft);
  padding: 4px 12px; border-radius: 100px; margin-bottom: 10px;
}

.hero h1 {
  font-size: clamp(26px, 4vw, 34px);
  font-weight: 700; letter-spacing: -0.03em; line-height: 1.15;
  margin-bottom: 8px;
}

.hero p {
  font-size: 15px; color: var(--text-secondary);
  max-width: 560px; line-height: 1.6;
}

.hero-search-wrap {
  position: relative; margin-top: 20px; max-width: 480px;
}

.hero-search {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 48px 12px 16px;
  font: 15px/1 var(--font); color: var(--text);
  background: var(--surface); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.hero-search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.search-kbd {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font: 11px/1 var(--mono); color: var(--text-tertiary);
  background: var(--surface-2); border: 1px solid var(--border);
  padding: 3px 6px; border-radius: 5px;
}

/* Page layout */
.page-content {
  max-width: var(--max); margin: 0 auto;
  padding: 24px 20px 64px;
}

.section { margin-bottom: 32px; }

.section-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-tertiary);
  margin-bottom: 14px;
}

.nav-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

.nav-overview-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  background: var(--surface);
}

.nav-overview-card h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}

.nav-overview-card p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 10px;
}

.nav-overview-count {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  background: var(--surface-2);
  padding: 2px 8px;
  border-radius: 999px;
  margin-bottom: 10px;
}

.nav-overview-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  font-size: 12px;
}

.nav-overview-tools a {
  color: var(--accent);
  font-weight: 500;
}

.nav-overview-tools a:hover { text-decoration: underline; }

.nav-overview-tools span { color: var(--text-tertiary); }

@media (max-width: 640px) {
  .nav-overview-grid { grid-template-columns: 1fr; }
}

/* Cement grade cards */
.cement-grade-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.cement-grade-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  background: var(--surface);
}

.cement-grade-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.cement-grade-badge {
  display: inline-grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: #ea580c18;
  color: #ea580c;
  font: 700 14px/1 var(--mono);
}

.cement-grade-card-head h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 0;
}

.cement-sulfate-tag {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  margin-left: auto;
}

.cement-grade-trait {
  font-size: 14px;
  color: var(--text);
  line-height: 1.55;
  margin-bottom: 12px;
}

.cement-grade-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 16px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.cement-grade-meta strong {
  color: var(--text);
  font-weight: 600;
}

.cement-grade-note {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.5;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

@media (max-width: 640px) {
  .cement-grade-grid { grid-template-columns: 1fr; }
  .cement-sulfate-tag { margin-left: 0; width: 100%; }
}

/* Category cards */
.category-list { display: flex; flex-direction: column; gap: 10px; }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}

.category-card {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s;
}

.category-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
}

.category-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: grid; place-items: center; flex-shrink: 0;
}

.category-card-icon svg { width: 24px; height: 24px; }

.category-card-text { flex: 1; min-width: 0; }

.category-card-name {
  display: block; font-size: 16px; font-weight: 600;
  letter-spacing: -0.02em;
}

.category-card-desc {
  display: block; font-size: 13px; color: var(--text-secondary);
  margin-top: 2px;
}

.category-card-count {
  display: block; font-size: 12px; color: var(--text-tertiary); margin-top: 4px;
}

.category-chevron {
  width: 20px; height: 20px; color: var(--text-tertiary); flex-shrink: 0;
}

/* Tool grid */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.tool-grid-sm { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }

.tool-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 20px 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  text-align: center; cursor: pointer;
}

.tool-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(15, 23, 42, 0.1);
}

.tool-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: grid; place-items: center;
}

.tool-card-icon svg { width: 26px; height: 26px; }

.tool-card-name {
  font-size: 13px; font-weight: 500; line-height: 1.35;
  color: var(--text);
}

.tool-card-cat {
  font-size: 11px; color: var(--text-tertiary);
}

.tool-card-sm { padding: 14px 8px 12px; }
.tool-card-sm .tool-card-icon { width: 40px; height: 40px; }
.tool-card-sm .tool-card-icon svg { width: 22px; height: 22px; }
.tool-card-sm .tool-card-name { font-size: 12px; }

/* Page header (tool/category) */
.page-header {
  display: flex; align-items: center; gap: 14px;
  max-width: var(--max); margin: 0 auto;
  padding: 20px 20px 0;
}

.back-btn {
  width: 36px; height: 36px; border: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer;
  display: grid; place-items: center; color: var(--text-secondary);
  flex-shrink: 0; transition: background 0.15s;
}

.back-btn:hover { background: var(--accent-soft); color: var(--accent); }
.back-btn svg { width: 20px; height: 20px; }

.page-header h1 {
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
}

.page-header p {
  font-size: 14px; color: var(--text-secondary); margin-top: 2px;
}

.tool-header-info {
  display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0;
}

.tool-header-icon {
  width: 44px; height: 44px; border-radius: 11px;
  display: grid; place-items: center; flex-shrink: 0;
}

.tool-header-icon svg { width: 24px; height: 24px; }

.tool-header-cat {
  font-size: 12px; color: var(--text-tertiary); font-weight: 500;
}

.fav-btn {
  width: 40px; height: 40px; border: none;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; color: var(--text-tertiary);
  display: grid; place-items: center; flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}

.fav-btn:hover, .fav-btn.active { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
.fav-btn svg { width: 20px; height: 20px; }

/* Tool layouts */
.tool-layout {
  display: grid; gap: 20px;
}

.calc-layout { grid-template-columns: 1fr 1fr; }
.tool-layout.single { grid-template-columns: 1fr; }

.panel {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.panel-head {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
}

.panel-head h2 {
  font-size: 17px; font-weight: 600; letter-spacing: -0.02em;
}

.panel-head p {
  font-size: 13px; color: var(--text-secondary);
  margin-top: 4px; line-height: 1.5;
}

.formula-chip {
  display: inline-block; margin-top: 10px;
  font: 12px/1.4 var(--mono);
  color: #92400e; background: rgba(217, 119, 6, 0.1);
  padding: 6px 10px; border-radius: 6px;
}

[data-theme="dark"] .formula-chip { color: #fbbf24; }

.panel-body { padding: 20px 22px 24px; }

.form-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}

.field label {
  display: block; font-size: 13px; font-weight: 500;
  margin-bottom: 6px;
}

.field-full { grid-column: 1 / -1; }

.field-input-row {
  display: flex; align-items: stretch;
  background: var(--bg); border: 1.5px solid transparent;
  border-radius: var(--radius-sm); overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.field-input-row:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--surface);
}

.field input {
  flex: 1; border: none; background: transparent;
  padding: 10px 12px; font: 500 15px/1 var(--font);
  color: var(--text); outline: none; min-width: 0;
}

.field .unit {
  padding: 0 12px; font-size: 12px; color: var(--text-tertiary);
  background: var(--surface-2); border-left: 1px solid var(--border);
  display: flex; align-items: center; white-space: nowrap;
}

.select-input {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  font: 14px/1 var(--font); color: var(--text);
  background: var(--bg); outline: none; cursor: pointer;
}

.select-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* Results */

  <script>
/* Drilling Toolkit — calculation engines */
(function () {
'use strict';

function nozzleTFA(nozzles) {
  // nozzles: array of diameters in 1/32 inch
  const tfa = nozzles.reduce((sum, n) => {
    const d = n / 32;
    return sum + (Math.PI / 4) * d * d;
  }, 0);
  return { tfa, tfaMm2: tfa * 645.16, count: nozzles.length };
}

function nozzleFromTFA(tfaIn2, count = 3) {
  const d = Math.sqrt((tfaIn2 * 4) / (Math.PI * count));
  return { diameter32: d * 32, diameterIn: d };
}

function mudPumpDisplacement(cylinders, boreMm, strokeMm, spm, efficiency = 0.95) {
  const boreM = boreMm / 1000;
  const strokeM = strokeMm / 1000;
  const volPerStroke = cylinders * (Math.PI / 4) * boreM * boreM * strokeM;
  const lps = (volPerStroke * spm * efficiency) / 60;
  return {
    lps,
    gpm: lps / 0.06309,
    m3min: lps / 16.667,
    volPerStroke: volPerStroke * 1000,
  };
}

function casingBurst(wallMm, yieldMpa, odMm, safety = 1.1) {
  const t = wallMm;
  const d = odMm;
  const burst = (2 * yieldMpa * t) / d;
  return { burst, safeBurst: burst / safety };
}

function casingCollapse(wallMm, yieldMpa, odMm, idMm, safety = 1.1) {
  const t = wallMm;
  const d = odMm;
  const e = d / t;
  const collapse =
    yieldMpa * ((e * e - 1) / (e * e + 1)) * (2 / Math.sqrt(3));
  return { collapse, safeCollapse: collapse / safety };
}

function casingTension(areaMm2, yieldMpa, safety = 1.6) {
  const tension = (areaMm2 * yieldMpa) / 1000;
  return { tension, safeTension: tension / safety };
}

function drillpipeTorsion(odMm, idMm, yieldMpa, safety = 1.5) {
  const J = (Math.PI / 32) * (Math.pow(odMm, 4) - Math.pow(idMm, 4));
  const torque = (J * yieldMpa) / (odMm * 1000 * safety);
  return { torque, J };
}

function drillpipeTension(areaMm2, yieldMpa, safety = 1.5) {
  const tension = (areaMm2 * yieldMpa) / 1000;
  return { tension, safeTension: tension / safety };
}

function wireRopeLoad(diameterMm, grade = '1770', safety = 5) {
  const grades = { 1770: 1770, 1960: 1960, 2160: 2160 };
  const tensile = grades[grade] || 1770;
  const area = Math.PI * Math.pow(diameterMm / 2, 2);
  const breaking = (area * tensile) / 1000;
  return { breaking, working: breaking / safety, area };
}

function makeupTorque(odIn, factor = 0.2, yieldKsi = 75) {
  // simplified API RP 7G style: T = factor × Y × A × OD
  const od = odIn;
  const area = Math.PI * Math.pow(od * 0.8, 2) / 4;
  const torque = factor * yieldKsi * 1000 * area * od / 12;
  return { torque: torque / 1000, torqueFtLbf: torque };
}

function convertUnit(value, fromFactor, toFactor) {
  const base = value * fromFactor;
  return base / toFactor;
}

function decodeIADC(code) {
  const s = String(code).replace(/\D/g, '').padStart(3, '0').slice(0, 3);
  const [a, b, c] = s.split('');
  return { series: a, formation: b, feature: c, code: s };
}

function pipeArea(odMm, idMm) {
  return (Math.PI / 4) * (odMm * odMm - idMm * idMm);
}

function fromApiGravity(api) {
  const sg = 141.5 / (api + 131.5);
  return { api, sg, densityGcm3: sg };
}

function apiFromGravity(sg) {
  const api = 141.5 / sg - 131.5;
  return { api, sg, densityGcm3: sg };
}

window.DTCalc = {
  nozzleTFA,
  nozzleFromTFA,
  mudPumpDisplacement,
  casingBurst,
  casingCollapse,
  casingTension,
  drillpipeTorsion,
  drillpipeTension,
  wireRopeLoad,
  makeupTorque,
  convertUnit,
  decodeIADC,
  pipeArea,
  fromApiGravity,
  apiFromGravity,
};
})();

  'casing-strength'(el) {
    el.innerHTML = calcLayout(
      '套管强度',
      '抗内压、抗外挤与抗拉强度估算',
      'P_burst = 2·Y·t / D',
      field('外径 OD', 'cs-od', 'mm') +
      field('壁厚', 'cs-wall', 'mm') +
      field('内径 ID', 'cs-id', 'mm') +
      field('屈服强度', 'cs-yield', 'MPa', 'number', 'any', '552') +

      'cs-result'
    );
    const update = () => {
      const od = +document.getElementById('cs-od').value;
      const wall = +document.getElementById('cs-wall').value;
      const id = +document.getElementById('cs-id').value;
      const y = +document.getElementById('cs-yield').value;
      const sf = +document.getElementById('cs-sf').value || 1.1;
      if (!od || !wall || !y) return;
      const burst = casingBurst(wall, y, od, sf);
      const collapse = id ? casingCollapse(wall, y, od, id, sf) : { collapse: 0, safeCollapse: 0 };
      const area = pipeArea(od, id || od - 2 * wall);
      const tension = casingTension(area, y, 1.6);
      document.getElementById('cs-result').innerHTML =
        resultHighlight('抗内压（安全）', burst.safeBurst.toFixed(1), 'MPa') +
        resultRows([
          ['抗内压（极限）', `${burst.burst.toFixed(1)} MPa`],
          ['抗外挤（安全）', id ? `${collapse.safeCollapse.toFixed(1)} MPa` : '—'],
          ['抗拉（安全）', `${tension.safeTension.toFixed(0)} kN`],
          ['金属截面积', `${area.toFixed(1)} mm²`],
        ]);
    };
    el.querySelectorAll('input').forEach((i) => i.addEventListener('input', update));
    update();
  },

    return;

  container.innerHTML = '';
  fn(container);
}

    'choke-coefficient': '<path d="M4 8h16l-8 10z"/><line x1="6" y1="18" x2="18" y2="18"/>',
    'api-gravity': '<circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="9" ry="4"/><line x1="3" y1="12" x2="21" y2="12"/>',
    'esp-pump': '<rect x="8" y="4" width="8" height="16" rx="2"/><line x1="10" y1="8" x2="14" y2="8"/><line x1="10" y1="12" x2="14" y2="12"/><line x1="10" y1="16" x2="14" y2="16"/>',
    'recommended-params': '<line x1="8" y1="6" x2="8" y2="18"/><line x1="12" y1="6" x2="12" y2="18"/><line x1="16" y1="6" x2="16" y2="18"/>',

window.DTTools = { renderTool, getToolIcon };
})();

  <script>
/* Drilling Toolkit — main application */
(function () {
'use strict';

if (!window.DT || !window.DTTools) {
  const main = document.getElementById('app-main');
  if (main) {
    main.innerHTML = '<div class="empty-state"><p>页面加载失败，请刷新重试</p></div>';
  }
  return;
}

const { CATEGORIES, DOMAINS, TOOLS, EXTERNAL_LINKS, WECHAT_PROMO, HIDDEN_REWARD, getTool, getCategory, getDomain, getToolsByCategory, getToolsByDomain, getToolDomain } = window.DT;
const { renderTool, getToolIcon } = window.DTTools;

const STORAGE_FAV = 'drilling-toolkit-favorites';
const STORAGE_RECENT = 'drilling-toolkit-recent';
const STORAGE_SIDEBAR = 'drilling-toolkit-sidebar-sections';

const DEFAULT_SIDEBAR_SECTIONS = {
  common: true,
  drilling: true,
  cementing: true,
  mud: true,
  completion: true,
  production: true,
};

const store = {
  get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* file:// 可能不可用 */ }
  },
  getStr(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  setStr(key, value) {
    try { localStorage.setItem(key, value); } catch (e) { /* ignore */ }
  },
};

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];

function getFavorites() {
  return store.get(STORAGE_FAV, []);
}

function setFavorites(favs) {
  store.set(STORAGE_FAV, favs);
}

function getRecent() {
  return store.get(STORAGE_RECENT, []);
}

function addRecent(id) {
  let r = getRecent().filter((x) => x !== id);
  r.unshift(id);
  r = r.slice(0, 6);
  store.set(STORAGE_RECENT, r);
  refreshSidebarCommon();
}

function parseRoute() {
  const hash = location.hash.slice(1) || 'home';
  const parts = hash.split('/');
  return { page: parts[0], param: parts[1] };
}

function navigate(page, param) {
  const hash = param ? `#${page}/${param}` : `#${page}`;
  if (location.hash !== hash) location.hash = hash;
}

let lastRouteKey = '';

function routeKey(route) {
  return `${route.page}|${route.param || ''}`;
}

function sidebarToolLink(tool, extraClass = '') {
  return `<a href="#tool/${tool.id}" class="sidebar-nav-link sidebar-tool-link ${extraClass}" data-tool-id="${tool.id}">
    <span class="sidebar-tool-dot" style="background:${tool.color}"></span>
    <span>${tool.name}</span>
  </a>`;
}

function getSidebarSectionsState() {
  return { ...DEFAULT_SIDEBAR_SECTIONS, ...store.get(STORAGE_SIDEBAR, {}) };
}

function saveSidebarSectionsState(state) {
  store.set(STORAGE_SIDEBAR, state);
}

function sidebarSection(id, title, bodyHtml, desc = '') {
  const state = getSidebarSectionsState();
  const expanded = state[id] !== false;
  return `<div class="sidebar-section${expanded ? '' : ' collapsed'}" data-section="${id}">
    <button type="button" class="sidebar-section-toggle" aria-expanded="${expanded}">
      <span class="sidebar-section-title">${title}</span>
      <svg class="sidebar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="sidebar-section-body">
      ${desc ? `<p class="sidebar-section-desc">${desc}</p>` : ''}
      ${bodyHtml}
    </div>
  </div>`;
}

function expandSidebarSection(id) {
  const section = document.querySelector(`[data-section="${id}"]`);
  if (!section) return;
  section.classList.remove('collapsed');
  section.querySelector('.sidebar-section-toggle')?.setAttribute('aria-expanded', 'true');
  const state = getSidebarSectionsState();
  state[id] = true;
  saveSidebarSectionsState(state);
}

function renderSidebarCommon() {
  const favs = getFavorites().map(getTool).filter(Boolean);
  const recent = getRecent().map(getTool).filter(Boolean);
  const favIds = new Set(favs.map((t) => t.id));
  const recentOnly = recent.filter((t) => !favIds.has(t.id));

  let html = '';
  if (favs.length) {
    html += favs.map((t) => sidebarToolLink(t, 'sidebar-fav-link')).join('');
  }
  if (recentOnly.length) {
    html += recentOnly.map((t) => sidebarToolLink(t, 'sidebar-recent-link')).join('');
  }
  if (!html) {
    html = '<p class="sidebar-empty">打开工具后自动记录最近使用；点击星标可加入常用</p>';
  }
  return html;
}

function sidebarExternalLink(href, label) {
  return `<a href="${href}" class="sidebar-nav-link sidebar-external-link" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
    <span>${label}</span>
  </a>`;
}

function renderSidebar() {
  const sidebar = $('#app-sidebar');
  if (!sidebar) return;

  const groupSections = DOMAINS.map((domain) => {
    const tools = getToolsByDomain(domain.id);
    const external =
      domain.id === 'cementing'
        ? sidebarExternalLink(EXTERNAL_LINKS.wellCementingCalculator, '固井计算器')
        : domain.id === 'mud'
          ? sidebarExternalLink(EXTERNAL_LINKS.drillingFluidCalculator, '钻井液计算器')
          : '';
    const body =
      `<div class="sidebar-tools">${tools.map((t) => sidebarToolLink(t)).join('')}${external}</div>`;
    return sidebarSection(domain.id, domain.name, body, domain.desc);
  }).join('');

  const commonBody = `<div class="sidebar-tools" id="sidebar-common">${renderSidebarCommon()}</div>`;

  sidebar.innerHTML = `<div class="sidebar-inner">
    <a href="#home" class="sidebar-nav-link sidebar-home-link" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg>
      <span>首页</span>
    </a>
    <button type="button" class="sidebar-nav-link sidebar-bonus-link" id="sidebar-bonus">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v8H4v-8M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
      <span>福利</span>
    </button>
    ${sidebarSection('common', '常用', commonBody)}
    ${groupSections}
  </div>`;
}

function updateSidebarActive(route) {
  $$('.sidebar-nav-link').forEach((link) => link.classList.remove('active'));

  if (route.page === 'home' || !route.page) {
    $('.sidebar-home-link')?.classList.add('active');
    return;
  }
  if (route.page === 'favorites') {
    expandSidebarSection('common');
    $('.sidebar-fav-link')?.classList.add('active');
    return;
  }
  if (route.page === 'tool' && route.param) {
    const tool = getTool(route.param);
    const domain = getToolDomain(tool);
    if (domain) expandSidebarSection(domain.id);
    const favs = getFavorites();
    const recent = getRecent();
    if (favs.includes(route.param) || recent.includes(route.param)) {
      expandSidebarSection('common');
    }
    $(`.sidebar-tool-link[data-tool-id="${route.param}"]`)?.classList.add('active');
  }
}

function refreshSidebarCommon() {
  const el = $('#sidebar-common');
  if (el) el.innerHTML = renderSidebarCommon();
}

function closeSidebar() {
  document.body.classList.remove('sidebar-open');
  const backdrop = $('#sidebar-backdrop');
  if (backdrop) backdrop.hidden = true;
}

function openSidebar() {
  document.body.classList.add('sidebar-open');
  const backdrop = $('#sidebar-backdrop');
  if (backdrop) backdrop.hidden = false;
}

function toggleSidebar() {
  if (document.body.classList.contains('sidebar-open')) closeSidebar();
  else openSidebar();
}

function bindSidebarEvents() {
  $('#sidebar-toggle')?.addEventListener('click', toggleSidebar);
  $('#sidebar-backdrop')?.addEventListener('click', closeSidebar);
  $('#app-sidebar')?.addEventListener('click', (e) => {
    if (e.target.closest('#sidebar-bonus')) {
      e.preventDefault();
      openBonusModal();
      if (window.innerWidth <= 900) closeSidebar();
      return;
    }
    const toggle = e.target.closest('.sidebar-section-toggle');
    if (toggle) {
      e.preventDefault();
      const section = toggle.closest('.sidebar-section');
      const id = section?.dataset.section;
      if (!section || !id) return;
      section.classList.toggle('collapsed');
      const expanded = !section.classList.contains('collapsed');
      toggle.setAttribute('aria-expanded', expanded);
      const state = getSidebarSectionsState();
      state[id] = expanded;
      saveSidebarSectionsState(state);
      return;
    }
    const link = e.target.closest('a[href^="#"]');
    if (link && window.innerWidth <= 900) closeSidebar();
  });
}

function toolCard(tool, size = 'md') {
  const domain = getToolDomain(tool);
  return `<a href="#tool/${tool.id}" class="tool-card tool-card-${size}" data-id="${tool.id}">
    <div class="tool-card-icon" style="color:${tool.color};background:${tool.color}18">${getToolIcon(tool.id)}</div>
    <span class="tool-card-name">${tool.name}</span>
    ${size === 'lg' ? `<span class="tool-card-cat">${domain?.name || ''}</span>` : ''}
  </a>`;
}

function domainCard(domain) {
  const count = getToolsByDomain(domain.id).length;
  return `<a href="#domain/${domain.id}" class="category-card">
    <div class="category-card-icon" style="color:${domain.color};background:${domain.bg}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
    </div>
    <div class="category-card-text">
      <span class="category-card-name">${domain.name}</span>
      <span class="category-card-desc">${domain.desc}</span>
      <span class="category-card-count">${count} 项工具</span>
    </div>
    <svg class="category-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </a>`;
}

function renderWechatPromo(variant = 'hero') {
  const { image, account, tagline } = WECHAT_PROMO;
  if (variant === 'footer') {
    return `<div class="footer-promo">
      <img src="${image}" alt="微信公众号 ${account}" class="footer-promo-img" width="72" height="72" loading="lazy">
      <div class="footer-promo-text">
        <strong>微信搜索「${account}」</strong>
        <span>${tagline}</span>
      </div>
    </div>`;
  }
  return `<div class="hero-promo-card">
    <span class="hero-promo-label">关注我们</span>
    <img src="${image}" alt="微信公众号 ${account} 二维码" class="hero-promo-img" width="128" height="128" loading="lazy">
    <p class="hero-promo-title">微信搜索「${account}」</p>
    <p class="hero-promo-desc">${tagline}</p>
  </div>`;
}

function renderFooter() {
  const footer = document.querySelector('footer');
  if (!footer) return;
  footer.innerHTML = `
    ${renderWechatPromo('footer')}
    <p>钻井工具箱 · Drilling Toolkit &mdash; MIT License</p>
  `;
}

function renderHome() {
  const recent = getRecent().map(getTool).filter(Boolean);
  const favs = getFavorites().map(getTool).filter(Boolean);

  return `<section class="page-home">
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-layout">
          <div class="hero-main">
            <span class="hero-badge">${TOOLS.length} 项专业工具</span>
            <h1>钻井工具箱</h1>
            <p>钻柱规格查询、强度校核、水力计算与井控装备参考 — 现场工程师的随身手册。左侧导航按施工业务分类，同类工具集中在一起。</p>
            <div class="hero-search-wrap">
              <input type="search" id="hero-search" class="hero-search" placeholder="搜索工具、规格、扣型…" autocomplete="off">
              <kbd class="search-kbd">⌘K</kbd>
            </div>
          </div>
          <aside class="hero-promo" aria-label="微信公众号">
            ${renderWechatPromo('hero')}
          </aside>
        </div>
      </div>
    </div>
    <div class="page-content">
      <section class="section">
        <h2 class="section-title">按业务浏览</h2>
        <div class="category-grid">
          ${DOMAINS.map((d) => domainCard(d)).join('')}
        </div>
      </section>
      <section class="section">
        <h2 class="section-title">业务速览</h2>
        <div class="nav-overview-grid">
          ${DOMAINS.map((d) => {
            const tools = getToolsByDomain(d.id);
            return `<div class="nav-overview-card">
              <h3>${d.name}</h3>
              <p>${d.desc}</p>
              <span class="nav-overview-count">${tools.length} 项</span>
              <div class="nav-overview-tools">
                ${tools.slice(0, 4).map((t) => `<a href="#tool/${t.id}">${t.name}</a>`).join('')}
                ${tools.length > 4 ? `<span>等 ${tools.length} 项</span>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </section>
      ${recent.length ? `<section class="section">
        <h2 class="section-title">最近使用</h2>
        <div class="tool-grid tool-grid-sm">${recent.map((t) => toolCard(t, 'sm')).join('')}</div>
      </section>` : ''}
      ${favs.length ? `<section class="section">
        <h2 class="section-title">收藏</h2>
        <div class="tool-grid tool-grid-sm">${favs.map((t) => toolCard(t, 'sm')).join('')}</div>
      </section>` : ''}
    </div>
  </section>`;
}

function renderDomain(id) {
  const domain = getDomain(id);
  if (!domain) return renderHome();
  const tools = getToolsByDomain(id);
  const externalBanner =
    id === 'cementing'
      ? `<div class="external-link-banner">
          <p>配浆加重、套管伸长、水泥用量、扶正器间距等固井工程计算？</p>
          <a href="${EXTERNAL_LINKS.wellCementingCalculator}" class="btn btn-primary btn-sm" target="_blank" rel="noopener">固井计算器 →</a>
        </div>`
      : id === 'mud'
        ? `<div class="external-link-banner">
            <p>助剂加量、混浆加重等钻井液专业计算？</p>
            <a href="${EXTERNAL_LINKS.drillingFluidCalculator}" class="btn btn-primary btn-sm" target="_blank" rel="noopener">钻井液计算器 →</a>
          </div>`
        : '';
  return `<section class="page-category">
    <div class="page-header">
      <button class="back-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div>
        <h1>${domain.name}</h1>
        <p>${domain.desc}</p>
      </div>
    </div>
    <div class="page-content">
      <div class="tool-grid">${tools.map((t) => toolCard(t)).join('')}</div>
      ${externalBanner}
    </div>
  </section>`;
}

function renderCategory(id) {
  const cat = getCategory(id);
  if (!cat) return renderHome();
  const tools = getToolsByCategory(id);
  return `<section class="page-category">
    <div class="page-header">
      <button class="back-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div>
        <h1>${cat.name}</h1>
        <p>${cat.desc}</p>
      </div>
    </div>
    <div class="page-content">
      <div class="tool-grid">${tools.map((t) => toolCard(t)).join('')}</div>
    </div>
  </section>`;
}

function renderToolPage(id) {
  const tool = getTool(id);
  if (!tool) return renderHome();
  const domain = getToolDomain(tool);
  const favs = getFavorites();
  const isFav = favs.includes(id);
  addRecent(id);

  return `<section class="page-tool">
    <div class="page-header">
      <button class="back-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="tool-header-info">
        <div class="tool-header-icon" style="color:${tool.color};background:${tool.color}18">${getToolIcon(id)}</div>
        <div>
          <span class="tool-header-cat">${domain?.name || ''}</span>
          <h1>${tool.name}</h1>
        </div>
      </div>
      <button class="fav-btn ${isFav ? 'active' : ''}" data-fav="${id}" title="收藏">
        <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </button>
    </div>
    <div class="page-content"><div id="tool-mount"></div></div>
  </section>`;
}

function renderFavorites() {
  const favs = getFavorites().map(getTool).filter(Boolean);
  return `<section class="page-category">
    <div class="page-header">
      <button class="back-btn" data-back><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div><h1>收藏</h1><p>你收藏的常用工具</p></div>
    </div>
    <div class="page-content">
      ${favs.length
        ? `<div class="tool-grid">${favs.map((t) => toolCard(t)).join('')}</div>`
        : '<div class="empty-state"><p>还没有收藏任何工具</p><p class="empty-hint">打开工具后点击右上角星标即可收藏</p></div>'}
    </div>
  </section>`;
}

function renderBonusModal() {
  const { url, password } = HIDDEN_REWARD;
  return `<div class="bonus-modal" id="bonus-modal">
    <div class="bonus-modal-backdrop" data-close-bonus></div>
    <div class="bonus-modal-panel">
      <button type="button" class="bonus-modal-close" data-close-bonus aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <h2>电子书资料库</h2>
      <p class="bonus-modal-desc">感谢关注能源数库，以下为整理的行业电子书资料。</p>
      <div class="bonus-field">
        <label>百度网盘</label>
        <div class="bonus-copy-row">
          <input type="text" class="bonus-input" value="${url}" readonly>
          <button type="button" class="btn btn-secondary btn-sm" data-copy-bonus="url">复制</button>
        </div>
      </div>
      <div class="bonus-field">
        <label>提取码</label>
        <div class="bonus-copy-row">
          <input type="text" class="bonus-input bonus-input-code" value="${password}" readonly>
          <button type="button" class="btn btn-secondary btn-sm" data-copy-bonus="password">复制</button>
        </div>
      </div>
      <a href="${url}" class="btn btn-primary bonus-open-btn" target="_blank" rel="noopener">打开百度网盘 →</a>
    </div>
  </div>`;
}

function closeBonusModal() {
  $('#bonus-modal')?.remove();
}

function openBonusModal() {
  closeBonusModal();
  document.body.insertAdjacentHTML('beforeend', renderBonusModal());
}

async function copyBonusValue(field, btn) {
  const text = field === 'password' ? HIDDEN_REWARD.password : HIDDEN_REWARD.url;
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const prev = btn.textContent;
      btn.textContent = '已复制';
      setTimeout(() => { btn.textContent = prev; }, 1500);
    }
  } catch (e) { /* ignore */ }
}

function bindBonusTriggers() {
  if (bindBonusTriggers.bound) return;
  bindBonusTriggers.bound = true;

  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-close-bonus]')) {
      e.preventDefault();
      closeBonusModal();
      return;
    }
    const copyBtn = e.target.closest('[data-copy-bonus]');
    if (copyBtn) {
      e.preventDefault();
      copyBonusValue(copyBtn.dataset.copyBonus, copyBtn);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('#bonus-modal')) closeBonusModal();
  });
}

function renderSearchModal(query = '') {
  const q = query.toLowerCase();
  const results = q
    ? TOOLS.filter((t) =>
        t.name.toLowerCase().includes(q) ||
        t.keywords.some((k) => k.toLowerCase().includes(q))
      )
    : TOOLS;
  return `<div class="search-modal" id="search-modal">
    <div class="search-modal-backdrop" data-close-search></div>
    <div class="search-modal-panel">
      <div class="search-modal-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="modal-search" value="${query}" placeholder="搜索工具…" autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="search-results">
        ${results.length
          ? results.map((t) => {
              const domain = getToolDomain(t);
              return `<a href="#tool/${t.id}" class="search-result" data-close-search>
                <div class="search-result-icon" style="color:${t.color}">${getToolIcon(t.id)}</div>
                <div><strong>${t.name}</strong><span>${domain?.name || getCategory(t.category)?.name || ''}</span></div>
              </a>`;
            }).join('')
          : '<div class="empty-state"><p>未找到匹配工具</p></div>'}
      </div>
    </div>
  </div>`;
}

function updateHeader(route) {
  const title = $('#page-title');
  const backBtn = $('#header-back');
  if (!title) return;

  if (route.page === 'tool' && route.param) {
    const t = getTool(route.param);
    title.textContent = t?.name || '钻井工具箱';
    backBtn?.classList.remove('hidden');
  } else if (route.page === 'domain' && route.param) {
    const d = getDomain(route.param);
    title.textContent = d?.name || '钻井工具箱';
    backBtn?.classList.remove('hidden');
  } else if (route.page === 'cat' && route.param) {
    const c = getCategory(route.param);
    title.textContent = c?.name || '钻井工具箱';
    backBtn?.classList.remove('hidden');
  } else if (route.page === 'favorites') {
    title.textContent = '收藏';
    backBtn?.classList.remove('hidden');
  } else {
    title.textContent = '';
    backBtn?.classList.add('hidden');
  }
}

function bindEvents() {
  $$('[data-back]').forEach((btn) => {
    btn.addEventListener('click', () => history.back());
  });

  const favBtn = $('.fav-btn');
  if (favBtn) {
    favBtn.addEventListener('click', () => {
      const id = favBtn.dataset.fav;
      let favs = getFavorites();
      if (favs.includes(id)) {
        favs = favs.filter((x) => x !== id);
        favBtn.classList.remove('active');
        favBtn.querySelector('svg').setAttribute('fill', 'none');
      } else {
        favs.push(id);
        favBtn.classList.add('active');
        favBtn.querySelector('svg').setAttribute('fill', 'currentColor');
      }
      setFavorites(favs);
      refreshSidebarCommon();
    });
  }

  const heroSearch = $('#hero-search');
  if (heroSearch) {
    heroSearch.addEventListener('focus', () => openSearch(heroSearch.value));
    heroSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openSearch(heroSearch.value);
    });
  }
}

function openSearch(query = '') {
  const existing = $('#search-modal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', renderSearchModal(query));
  const input = $('#modal-search');
  input?.focus();
  input?.select();

  const updateResults = () => {
    const modal = $('#search-modal');
    if (!modal) return;
    modal.outerHTML = renderSearchModal(input.value);
    bindSearchModal();
    $('#modal-search')?.focus();
  };

  $('#modal-search')?.addEventListener('input', updateResults);
  bindSearchModal();
}

function bindSearchModal() {
  $$('[data-close-search]').forEach((el) => {
    el.addEventListener('click', () => {
      $('#search-modal')?.remove();
    });
  });
}

function render() {
  const route = parseRoute();
  const key = routeKey(route);
  if (key === lastRouteKey) return;
  lastRouteKey = key;

  const main = $('#app-main');
  if (!main) return;

  updateHeader(route);
  updateSidebarActive(route);

  let html = '';
  switch (route.page) {
    case 'domain':
      html = renderDomain(route.param);
      break;
    case 'cat':
      html = renderCategory(route.param);
      break;
    case 'tool':
      html = renderToolPage(route.param);
      break;
    case 'favorites':
      html = renderFavorites();
      break;
    default:
      html = renderHome();
  }

  main.innerHTML = html;
  bindEvents();

  if (route.page === 'tool' && route.param) {
    const mount = $('#tool-mount');
    if (mount) renderTool(route.param, mount);
  }

  document.title = route.page === 'tool' && getTool(route.param)
    ? `${getTool(route.param).name} · 钻井工具箱`
    : '钻井工具箱 · Drilling Toolkit';
}

function initTheme() {
  const saved = store.getStr('drilling-toolkit-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  store.setStr('drilling-toolkit-theme', next);
}

function boot() {
  try {
    if (!window.DT || !window.DTTools) {
      throw new Error('数据模块未加载');
    }
    initTheme();
    bindBonusTriggers();
    renderFooter();
    renderSidebar();
    bindSidebarEvents();

    $('#theme-toggle')?.addEventListener('click', toggleTheme);
    $('#nav-favorites')?.addEventListener('click', (e) => {
      e.preventDefault();
      navigate('favorites');
    });
    $('#header-back')?.addEventListener('click', () => history.back());
    $('#open-search')?.addEventListener('click', () => openSearch());

    window.addEventListener('hashchange', render);

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
      }
      if (e.key === 'Escape') $('#search-modal')?.remove();
    });

    if (!location.hash || location.hash === '#') {
      location.hash = '#home';
    } else {
      render();
    }
  } catch (err) {
    console.error(err);
    const main = document.getElementById('app-main');
    if (main) {
      main.innerHTML = '<div class="empty-state"><p>页面加载失败</p><p class="empty-hint">' + err.message + '</p></div>';
    }
  }
}

boot();
})();

  </script>
</body>
</html>
